{% extends "base.html" %}
{% block title %}Нууц үг солих{% endblock %}
{% block content %}

<style>
    .page {
        max-width: 520px;
        margin: 40px auto;
    }

    .card {
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 16px;
        box-shadow: 0 12px 28px rgba(2,6,23,.06);
        padding: 28px;
    }

    .title {
        font-size: 20px;
        margin-bottom: 6px;
    }

    .sub {
        font-size: 13px;
        color: #64748b;
        margin-bottom: 18px;
    }

    .form-group {
        margin-bottom: 14px;
    }

    label {
        display: block;
        font-size: 13px;
        margin-bottom: 4px;
    }

    .input {
        width: 100%;
        height: 40px;
        border-radius: 10px;
        border: 1px solid #dbe2ea;
        padding: 0 12px;
        font-size: 14px;
    }

        .input:focus {
            outline: none;
            border-color: #93c5fd;
            box-shadow: 0 0 0 3px rgba(59,130,246,.12);
        }

    .btn {
        width: 100%;
        height: 40px;
        border-radius: 999px;
        border: 1px solid transparent;
        cursor: pointer;
        font-size: 14px;
        margin-top: 6px;
    }

    .btn-save {
        background: #0b5f57;
        color: #fff;
    }

        .btn-save:hover {
            background: #094e48;
        }
</style>

<div class="page">
    <div class="card">
        <div class="title">Нууц үг солих</div>
        <div class="sub">Өөрийн одоогийн нууц үгийг ашиглан шинэ нууц үг тохируулна.</div>

        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div class="form-group">
                <label>Одоогийн нууц үг</label>
                <input class="input" type="password" name="current_password" required>
            </div>

            <div class="form-group">
                <label>Шинэ нууц үг</label>
                <input class="input" type="password" name="new_password" required>
            </div>

            <div class="form-group">
                <label>Шинэ нууц үг давтах</label>
                <input class="input" type="password" name="confirm_password" required>
            </div>

            <button class="btn btn-save" type="submit">Нууц үг солих</button>
        </form>
    </div>
</div>

{% endblock %}
