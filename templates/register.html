{% extends "base.html" %}
{% block title %}Бүртгүүлэх{% endblock %}
{% block main_class %}main--wide{% endblock %}
{% block content %}

<style>
    .auth-wrap {
        min-height: calc(100vh - 180px);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px 12px;
    }

    .auth-card {
        width: 100%;
        max-width: 520px;
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 18px;
        box-shadow: 0 18px 45px rgba(2,6,23,.10);
        overflow: hidden;
        color: #0b1220;
        font-weight: 400;
    }

    .auth-head {
        padding: 18px 18px 16px;
        background: linear-gradient(90deg,#0b5f57,#0a534c);
        color: #fff;
    }

    .auth-title {
        margin: 0;
        font-size: 22px;
        letter-spacing: .2px;
        font-weight: 500; 
    }

    .auth-sub {
        margin: 6px 0 0;
        font-size: 13px;
        color: rgba(255,255,255,.92);
        line-height: 1.35;
        font-weight: 400; 
    }

    .auth-body {
        padding: 18px;
        background: #ffffff;
    }

    .grid {
        display: grid;
        gap: 12px;
    }

    label {
        display: block;
        font-size: 13px;
        color: #0f172a;
        margin: 0 0 6px;
        font-weight: 500; 
    }

    .input {
        width: 100%;
        height: 44px;
        border: 1px solid #d7dee7;
        border-radius: 12px;
        padding: 0 12px;
        background: #fff;
        font-size: 14px;
        outline: none;
        font-weight: 400; 
        color: #0b1220;
    }

        .input:focus {
            border-color: #60a5fa;
            box-shadow: 0 0 0 3px rgba(96,165,250,.18);
        }

    .btn {
        width: 100%;
        height: 44px;
        border-radius: 999px;
        border: 1px solid #0b5f57;
        background: #0b5f57;
        color: #fff;
        cursor: pointer;
        font-size: 14px;
        font-weight: 500; 
    }

        .btn:hover {
            filter: brightness(.98);
        }

    .auth-foot {
        padding: 14px 18px 18px;
        border-top: 1px solid #f1f5f9;
        background: #fbfdff;
        font-size: 13px;
        color: #64748b;
        display: flex;
        justify-content: space-between;
        gap: 10px;
        flex-wrap: wrap;
        font-weight: 400;
    }

    .link {
        color: #0b66c3;
        text-decoration: none;
        font-weight: 400;
    }

        .link:hover {
            text-decoration: underline;
        }

    .note {
        font-size: 12px;
        color: #64748b;
        margin-top: 6px;
        line-height: 1.35;
        font-weight: 400;
    }
</style>

<div class="auth-wrap">
    <div class="auth-card">

        <div class="auth-head">
            <h1 class="auth-title">Бүртгүүлэх</h1>
            <div class="auth-sub">Системд шинэ хэрэглэгч үүсгэнэ.</div>
        </div>

        <div class="auth-body">
            <form method="POST" action="{{ url_for('register') }}">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                <div class="grid">
                    <div>
                        <label>Хэрэглэгчийн нэр</label>
                        <input class="input" name="username"
                               placeholder="Жишээ: auditor01"
                               value="{{ request.form.get('username','') }}"
                               autocomplete="username" required>
                    </div>

                    <div>
                        <label>Имэйл хаяг</label>
                        <input class="input" type="email" name="email"
                               placeholder="name@company.mn"
                               value="{{ request.form.get('email','') }}"
                               autocomplete="email" required>
                    </div>

                    <div>
                        <label>Нууц үг</label>
                        <input class="input" type="password"
                               name="password"
                               placeholder="••••••••"
                               autocomplete="new-password" required>
                       
                    </div>

                    <button class="btn" type="submit">Бүртгүүлэх</button>
                </div>
            </form>
        </div>

        <div class="auth-foot">
            <div>Бүртгэлтэй бол</div>
            <a class="link" href="{{ url_for('login') }}">Нэвтрэх</a>
        </div>

    </div>
</div>

{% endblock %}
