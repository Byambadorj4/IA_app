{% extends "base.html" %}
{% block title %}Нэвтрэх{% endblock %}
{% block main_class %}main--wide{% endblock %}

{% block content %}
<style>
    .auth-wrap {
        min-height: calc(100vh - 40px);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
    }

    .auth-card {
        width: min(520px,100%);
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 20px;
        box-shadow: 0 18px 45px rgba(2,6,23,.12);
        overflow: hidden;
        color: #0b1220;
        font-weight: 400;
    }

    .auth-head {
        background: linear-gradient(90deg, #0b5f57, #0a534c);
        color: #fff;
        padding: 16px 18px 14px;
    }

    .auth-brand {
        display: flex;
        align-items: center;
        gap: 12px;
    }

    .auth-logo {
        height: 42px;
        width: auto;
        object-fit: contain;
        display: block;
        flex: 0 0 auto;
    }

    .auth-titlebox {
        display: flex;
        flex-direction: column;
        min-width: 0;
    }

    .auth-head h1 {
        margin: 0;
        font-size: 20px;
        font-weight: 600;
        letter-spacing: .2px;
        line-height: 1.15;
        color: #fff;
    }

    .auth-head p {
        margin: 4px 0 0;
        font-size: 12px;
        opacity: .92;
        font-weight: 400;
        color: rgba(255,255,255,.92);
        line-height: 1.25;
    }

    .auth-body {
        padding: 18px;
    }

    .field {
        display: flex;
        flex-direction: column;
        gap: 6px;
        margin-bottom: 12px;
    }

        .field label {
            font-weight: 500;
            font-size: 13px;
            color: #0f172a;
        }

        .field input {
            height: 44px;
            border-radius: 14px;
            border: 1px solid #d7dee7;
            padding: 0 12px;
            outline: none;
            font-weight: 400;
            color: #0b1220;
            background: #fff;
        }

            .field input:focus {
                border-color: #60a5fa;
                box-shadow: 0 0 0 3px rgba(96,165,250,.18);
            }

    .auth-actions {
        display: flex;
        gap: 10px;
        margin-top: 6px;
    }

        .auth-actions .btn {
            width: 100%;
            height: 44px;
            border-radius: 14px;
            font-weight: 500;
            background: #0b5f57;
            border: 1px solid #0b5f57;
            color: #fff;
            cursor: pointer;
        }

            .auth-actions .btn:hover {
                filter: brightness(.98);
            }

    .auth-foot {
        padding: 14px 18px 18px;
        border-top: 1px solid #f1f5f9;
        display: flex;
        justify-content: space-between;
        gap: 10px;
        flex-wrap: wrap;
        color: #64748b;
        font-size: 13px;
        font-weight: 400;
        background: #fbfdff;
    }

    .link {
        color: #0b66c3;
        text-decoration: none;
        font-weight: 400;
    }

        .link:hover {
            text-decoration: underline;
        }

    @media (max-width: 640px) {
        .auth-wrap {
            padding: 14px;
        }

        .auth-head {
            padding: 14px 14px 12px;
        }

        .auth-logo {
            height: 36px;
        }

        .auth-head h1 {
            font-size: 18px;
        }

        .auth-head p {
            font-size: 11px;
        }

        .auth-body {
            padding: 14px;
        }

        .auth-foot {
            padding: 12px 14px 14px;
        }
    }
</style>

<div class="auth-wrap">
    <div class="auth-card">
        <div class="auth-head">
            <div class="auth-brand">
                <img class="auth-logo"
                     src="{{ url_for('static', filename='images/erdenesmongol_logo.png') }}"
                     alt="Эрдэнэс Монгол лого">

                <div class="auth-titlebox">
                    <h1>Нэвтрэх</h1>
                    
                </div>
            </div>
        </div>

        <div class="auth-body">
            <form method="POST" action="{{ url_for('login') }}">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                <div class="field">
                    <label>Нэвтрэх нэр</label>
                    <input name="username" autocomplete="username" required>
                </div>

                <div class="field">
                    <label>Нууц үг</label>
                    <input type="password" name="password" autocomplete="current-password" required>
                </div>

                <div class="auth-actions">
                    <button class="btn" type="submit">Нэвтрэх</button>
                </div>
            </form>
        </div>

        <div class="auth-foot">
            <a class="link" href="{{ url_for('register') }}">Бүртгүүлэх</a>
        </div>
    </div>
</div>
{% endblock %}
